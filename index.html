<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hammer Game Surprise</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI, sans-serif;
background:linear-gradient(135deg,#1e90ff,#ffe4e1,#b0c4de);
overflow:hidden;
color:#000;
}
.container{
background:#fff0f5;
padding:40px;
border-radius:20px;
text-align:center;
width:480px;
box-shadow:0 0 25px #1e90ff;
position:relative;
}
h1{
color:#1e90ff;
}
#targetBtn{
width:120px;
height:50px;
font-size:16px;
border:none;
border-radius:10px;
background:#ff69b4;
color:white;
position:absolute;
top:250px;
left:180px;
transition:all 0.2s ease;
}
#healthBar{
width:120px;
height:15px;
background:#ccc;
border-radius:8px;
margin:10px auto;
}
#healthFill{
height:100%;
width:100%;
background:#1e90ff;
border-radius:8px;
transition:width 0.2s;
}
#hammer{
width:60px;
position:absolute;
top:50px;
left:200px;
cursor:pointer;
transition:transform 0.1s;
}
#message{
display:none;
font-size:18px;
margin-top:20px;
color:#000;
}
.heart{
position:absolute;
color:#ff69b4;
font-size:18px;
animation:floatUp 6s linear infinite;
}
@keyframes floatUp{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}
</style>
</head>
<body>
<div class="container">
<h1>Smash the Button!</h1>
<p>Use the hammer to hit the button as fast as you can 🛠️</p>
<img src="https://i.ibb.co/TrQx5bH/hammer.png" id="hammer">
<div id="healthBar"><div id="healthFill"></div></div>
<button id="targetBtn">Hit Me!</button>
<p id="message">
As you defeated the button, I wish to God you defeat every life problem.  
Happy Women's Day, Pratiksha! 🎉
</p>
</div>
<script>
let hammer = document.getElementById("hammer");
let targetBtn = document.getElementById("targetBtn");
let healthFill = document.getElementById("healthFill");
let message = document.getElementById("message");

let maxHealth = 100;
let currentHealth = maxHealth;
let hits = 0;
const totalHits = 5; // number of hits before button dies

// hammer swing animation
let swinging = false;
hammer.addEventListener("mousedown", () => { swinging=true; });
hammer.addEventListener("mouseup", () => { swinging=false; hammer.style.transform='rotate(0deg)'; });
hammer.addEventListener("mousemove", (e) => {
    if(swinging){
        let x = e.clientX;
        let y = e.clientY;
        hammer.style.left = x - 30 + "px";
        hammer.style.top = y - 30 + "px";
    }
});

// hammer touch support
hammer.addEventListener("touchstart", e => { swinging=true; });
hammer.addEventListener("touchend", e => { swinging=false; hammer.style.transform='rotate(0deg)'; });
hammer.addEventListener("touchmove", e => {
    if(swinging){
        let touch = e.touches[0];
        hammer.style.left = touch.clientX - 30 + "px";
        hammer.style.top = touch.clientY - 30 + "px";
    }
});

// create floating hearts
function createHearts(){
    for(let i=0;i<15;i++){
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="♥";
        heart.style.left=Math.random()*100+"vw";
        heart.style.animationDuration=(4+Math.random()*4)+"s";
        document.body.appendChild(heart);
    }
}
createHearts();

// button hit
targetBtn.addEventListener("click", () => {
    hits++;
    currentHealth = maxHealth - (hits*(maxHealth/totalHits));
    if(currentHealth < 0) currentHealth = 0;
    healthFill.style.width = currentHealth + "%";
    hammer.style.transform = "rotate(-30deg)";
    setTimeout(()=>{hammer.style.transform='rotate(0deg)';},100);

    // teleport button to random position
    if(currentHealth > 0){
        let container = document.querySelector(".container");
        let maxX = container.offsetWidth - targetBtn.offsetWidth;
        let maxY = container.offsetHeight - targetBtn.offsetHeight;
        targetBtn.style.left = Math.random()*maxX + "px";
        targetBtn.style.top = Math.random()*maxY + "px";
    } else {
        // final hit
        message.style.display = "block";
        targetBtn.disabled = true;
    }
});
</script>
</body>
</html>
