<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hammer Smash Game</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Segoe UI, sans-serif;
  background:linear-gradient(135deg,#1e90ff,#ffe4e1,#b0c4de);
  overflow:hidden;
}
.container{
  background:#fff0f5;
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:500px;
  box-shadow:0 0 25px #1e90ff;
  position:relative;
}
h1{
  color:#1e90ff;
}
#targetBtn{
  width:120px;
  height:50px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#ff69b4;
  color:white;
  position:absolute;
  top:250px;
  left:190px;
  transition:all 0.2s ease;
}
#healthBar{
  width:120px;
  height:15px;
  background:#ccc;
  border-radius:8px;
  margin:10px auto;
}
#healthFill{
  height:100%;
  width:100%;
  background:#1e90ff;
  border-radius:8px;
  transition:width 0.2s;
}
#hammer{
  font-size:60px;
  position:absolute;
  top:50px;
  left:220px;
  cursor:pointer;
  transition:transform 0.1s;
  user-select:none;
}
#message{
  display:none;
  font-size:18px;
  margin-top:20px;
  color:#000;
  animation:fadeIn 1s forwards;
}
.petal{
  position:absolute;
  color:#ff69b4;
  font-size:18px;
  animation:fall 5s linear infinite;
}
.heart{
  position:absolute;
  color:#ff69b4;
  font-size:18px;
  animation:floatUp 6s linear infinite;
}
@keyframes fall{
  from{transform:translateY(-10vh) rotate(0deg);}
  to{transform:translateY(100vh) rotate(360deg);}
}
@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>
<body>
<div class="container">
<h1>Hammer Smash Game!</h1>
<p>Hit the button as fast as you can 🛠️</p>
<div id="hammer">🛠️</div>
<div id="healthBar"><div id="healthFill"></div></div>
<button id="targetBtn">Hit Me!</button>
<p id="message">
As you defeated the button, I wish to God you defeat every life problem.<br>
Happy Women's Day, Pratiksha! 🎉
</p>
</div>

<script>
let hammer = document.getElementById("hammer");
let targetBtn = document.getElementById("targetBtn");
let healthFill = document.getElementById("healthFill");
let message = document.getElementById("message");
let container = document.querySelector(".container");

let maxHealth = 100;
let currentHealth = maxHealth;
let hits = 0;
const totalHits = 5;

let swinging = false;

// Hammer drag
hammer.addEventListener("mousedown", ()=>swinging=true);
hammer.addEventListener("mouseup", ()=>{swinging=false; hammer.style.transform='rotate(0deg)';});
hammer.addEventListener("mousemove", e=>{
  if(swinging){
    hammer.style.left = e.clientX - 30 + "px";
    hammer.style.top = e.clientY - 30 + "px";
  }
});

// Touch support
hammer.addEventListener("touchstart", e=>swinging=true);
hammer.addEventListener("touchend", e=>{swinging=false; hammer.style.transform='rotate(0deg)';});
hammer.addEventListener("touchmove", e=>{
  if(swinging){
    let touch = e.touches[0];
    hammer.style.left = touch.clientX - 30 + "px";
    hammer.style.top = touch.clientY - 30 + "px";
  }
});

// Floating hearts
function createHearts(){
  for(let i=0;i<15;i++){
    let heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="♥";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (4+Math.random()*4) + "s";
    document.body.appendChild(heart);
  }
}
createHearts();

// Floating petals
function createPetals(){
  for(let i=0;i<20;i++){
    let petal = document.createElement("div");
    petal.className = "petal";
    petal.innerHTML="🌸";
    petal.style.left = Math.random()*100 + "vw";
    petal.style.animationDuration=(3+Math.random()*4)+"s";
    document.body.appendChild(petal);
  }
}

// Button hit
targetBtn.addEventListener("click", ()=>{
  hits++;
  currentHealth = maxHealth - (hits*(maxHealth/totalHits));
  if(currentHealth<0) currentHealth=0;
  healthFill.style.width = currentHealth + "%";

  // Hammer swing animation
  hammer.style.transform = "rotate(-30deg)";
  setTimeout(()=>hammer.style.transform='rotate(0deg)',100);

  if(currentHealth>0){
    // teleport button
    let maxX = container.offsetWidth - targetBtn.offsetWidth;
    let maxY = container.offsetHeight - targetBtn.offsetHeight;
    targetBtn.style.left = Math.random()*maxX + "px";
    targetBtn.style.top = Math.random()*maxY + "px";

    // rotate button randomly for extra interaction
    let angle = Math.floor(Math.random()*60 - 30);
    targetBtn.style.transform = `rotate(${angle}deg)`;
  } else {
    // final hit
    message.style.display = "block";
    targetBtn.disabled = true;
    createPetals();
    targetBtn.style.transform = "rotate(0deg)";
  }
});
</script>
</body>
</html>
